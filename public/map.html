<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>지도 | 육진대 맵</title>
<link rel="icon" type="image/svg+xml" href="assets/logo/character-logo.svg" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A2F6B" />
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/map.css" />
</head>
<body>
<div class="app app--map">

  <header class="header">
    <a class="header__brand" href="index.html">
      <img class="header__logo" src="assets/logo/character-logo.svg" alt="육진대" />
      <span class="header__title">육진대 맵</span>
    </a>
    <button class="header__install" type="button" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12" /><path d="M7 10l5 5 5-5" /><path d="M5 19h14" /></svg>
      설치
    </button>
  </header>

  <div class="map-toolbar">
    <div class="map-toolbar__regions" id="map-region-chips"></div>
  </div>

  <div id="map" class="map-canvas"></div>
  <button id="locate-btn" class="map-locate-btn" title="현재 위치">📍</button>

  <div class="map-sheet" id="map-sheet">
    <div class="map-sheet__handle"></div>
    <div id="map-sheet-content"></div>
  </div>

  <nav class="tabbar">
    <a class="tabbar__item" href="index.html"><span class="tabbar__icon">🏠</span>홈</a>
    <a class="tabbar__item is-active" href="map.html"><span class="tabbar__icon">🗺️</span>지도</a>
    <a class="tabbar__item" href="#"><span class="tabbar__icon">❤️</span>찜</a>
    <a class="tabbar__item" href="#"><span class="tabbar__icon">👤</span>내정보</a>
  </nav>

</div>

<script src="/naver-config"></script>
<script>
  document.write('<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=' + window.__ENV__.NAVER_MAP_CLIENT_ID + '"><\/script>');
</script>
<script src="js/map.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
