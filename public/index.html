<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>육진대 맵 | 아빠와 아이가 갈만한 곳</title>
<link rel="icon" type="image/svg+xml" href="assets/logo/character-logo.svg" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A2F6B" />
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="splash" id="splash">
  <img class="splash__bg" src="assets/splash/splash-bg.jpg" alt="육진대" />
</div>
<script>
  (function () {
    var splash = document.getElementById("splash");
    if (sessionStorage.getItem("splashShown")) {
      splash.style.display = "none";
      window.dispatchEvent(new Event("splashHidden"));
    } else {
      sessionStorage.setItem("splashShown", "1");
      setTimeout(function () {
        splash.classList.add("splash--hide");
        setTimeout(function () {
          splash.style.display = "none";
          window.dispatchEvent(new Event("splashHidden"));
        }, 400);
      }, 1200);
    }
  })();
</script>

<div class="app">

  <header class="header header--home">
    <a class="header__brand" href="index.html">
      <img class="header__logo" src="assets/logo/character-logo.svg" alt="육진대" />
      <span class="header__title">아빠, 어디가? <span class="header__subtitle">by 육진대</span></span>
    </a>
    <div class="header__actions">
      <button class="header__bell" type="button" aria-label="알림">🔔</button>
      <button class="header__install" type="button" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12" /><path d="M7 10l5 5 5-5" /><path d="M5 19h14" /></svg>
        설치
      </button>
    </div>
  </header>

  <div class="search">
    <input class="search__input" id="search-input" type="search" placeholder="지역, 장소를 검색해보세요" />
  </div>

  <section class="section">
    <h2 class="section__title">지역별로 찾아보기</h2>
    <div class="region-grid" id="region-grid">
      <!-- 서울/경기북부/경기남부/강원도/충청도/전라도/인천/제주 -->
    </div>
  </section>

  <section class="banner">
    <div class="banner__track" id="hero-track">
      <div class="banner__slide">
        <img class="banner__logo" src="assets/logo/main-logo.svg" alt="육진대 - 육아에 진심인 대디" />
        <p class="banner__tagline">아빠들이 직접 다녀온, 아빠와 아이가 갈만한 곳</p>
      </div>
      <div class="banner__slide banner__slide--stat">
        <p class="banner__big">300+</p>
        <p class="banner__tagline">아빠 크리에이터가 함께 만드는 지도</p>
      </div>
      <div class="banner__slide banner__slide--stat">
        <p class="banner__big">99곳</p>
        <p class="banner__tagline">전국 방방곡곡, 직접 다녀온 곳만 소개해요</p>
      </div>
    </div>
    <div class="banner__dots" id="hero-dots"></div>
  </section>

  <div class="tag-filter" id="tag-filter">
    <!-- 자연/공원, 실내놀이, 맛집, 카페, 체험/문화, 스포츠, 무료 -->
  </div>

  <section class="section">
    <h2 class="section__title">추천장소</h2>
    <div class="place-grid" id="place-list">
      <p class="place-list__loading" id="place-loading">불러오는 중...</p>
    </div>
    <div id="place-sentinel"></div>
  </section>

  <nav class="tabbar">
    <a class="tabbar__item is-active" href="index.html"><span class="tabbar__icon">🏠</span>홈</a>
    <a class="tabbar__item" href="map.html"><span class="tabbar__icon">🗺️</span>지도</a>
    <a class="tabbar__item" href="#"><span class="tabbar__icon">❤️</span>찜</a>
    <a class="tabbar__item" href="#"><span class="tabbar__icon">👤</span>내정보</a>
  </nav>

</div>

<script src="js/app.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
